    <script>
        // 通用进场语音：拦截 loadlive2d，加载模型后读取 index.json 中的 sound 并随机播放
        (function () {
            const original = window.loadlive2d;
            if (!original) return;

            window.loadlive2d = function (canvasId, url) {
                original.call(window, canvasId, url);

                // 从 url 提取模型目录，读取 index.json 获取 sound 配置
                setTimeout(function () {
                    try {
                        // url 格式: live2d-api-main/model/xxx/xxx/index.json
                        var baseUrl = url.replace(/\/index\.json$/, '');
                        fetch(baseUrl + '/index.json')
                            .then(function (r) { return r.json(); })
                            .then(function (idx) {
                                if (!idx.motions) return;

                                // 1. 优先检查是否有 start 动作且有 sound
                                if (idx.motions.start) {
                                    var startWithSound = idx.motions.start.filter(function (m) { return m.sound; });
                                    if (startWithSound.length > 0) {
                                        var soundPath = startWithSound[Math.floor(Math.random() * startWithSound.length)].sound;
                                        playSound(baseUrl + '/' + soundPath);
                                        return;
                                    }
                                }

                                // 2. 否则收集所有带 sound 的动作，随机播放一条
                                var allSounds = [];
                                Object.keys(idx.motions).forEach(function (key) {
                                    idx.motions[key].forEach(function (m) {
                                        if (m.sound) allSounds.push(m.sound);
                                    });
                                });
                                if (allSounds.length > 0) {
                                    var randomSound = allSounds[Math.floor(Math.random() * allSounds.length)];
                                    playSound(baseUrl + '/' + randomSound);
                                }
                            })
                            .catch(function (e) { console.log('[Live2D] 读取 sound 配置失败:', e); });
                    } catch (e) {
                        console.error('[Live2D] 进场语音出错:', e);
                    }
                }, 1500); // 等模型加载完成
            };

            function playSound(src) {
                console.log('[Live2D] 播放进场音效:', src);
                var audio = new Audio(src);
                audio.play().catch(function (e) { console.log('[Live2D] 音效播放失败:', e); });
            }
        })();
    </script>
    <script>
        // 初始化 Live2D
        (function () {
            const live2d_path = "live2d-api-main/";
            localStorage.removeItem("waifu-display");

            if (window.initWidget) {
                initWidget({
                    waifuPath: live2d_path + "waifu-tips.json",
                    cdnPath: live2d_path,
                });
            } else {
                console.error("[Live2D] initWidget 未定义！");
            }
        })();
